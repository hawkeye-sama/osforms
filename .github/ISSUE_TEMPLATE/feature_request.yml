name: Feature request
description: Suggest an integration, endpoint, or improvement
title: 'feat: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution. What are you building, and where does OSForms fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: If you have a specific solution in mind, sketch it here. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds you've considered
      description: e.g. "I could use a webhook for this, but..."
    validations:
      required: false
